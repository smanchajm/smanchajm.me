services:
  portfolio:
    build:
      context: .
      args:
        SITE_URL: ${SITE_URL:-https://smanchajm.me}
    container_name: smanchajm-portfolio
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`smanchajm.me`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
