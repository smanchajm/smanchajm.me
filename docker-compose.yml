services:
  portfolio:
    build:
      context: .
      args:
        SITE_URL: ${SITE_URL:-https://samuelmanchajm.fr}
    container_name: smanchajm-portfolio
    restart: unless-stopped
    networks:
      - traefik-public
    security_opt:
      - "no-new-privileges:true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`samuelmanchajm.fr`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls=true"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
