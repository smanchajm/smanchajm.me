name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # 1. Aller dans le dossier du projet
            cd ${{ vars.VPS_PATH }}
            
            # 2. Récupérer le dernier code de GitHub
            git fetch origin
            git reset --hard origin/main
            
            # 3. Re-build l'image localement (avec les build-args si besoin)
            # On utilise --build-arg directement si elles sont dans ton .env ou passées via le shell
            docker compose build --no-cache
            
            # 4. Redémarrer le service sans impacter les autres
            docker compose up -d portfolio
            
            # 5. Nettoyage
            docker image prune -f